<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h1>Eating Contest</h1>
  <p class="subtitle">Word Replacer</p>

  <div id="pairs-list"></div>

  <div class="add-pair">
    <input type="text" id="from-input" placeholder="Original word">
    <span class="arrow">-></span>
    <input type="text" id="to-input" placeholder="Replacement">
    <button id="add-btn" title="Add pair">+</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
